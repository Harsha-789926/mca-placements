<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <h1>Grocery Management System</h1>

    <div class="input">
        <input type="text" id="item-name" placeholder="Enter item name">
        <input type="number" id="item-quantity" placeholder="Enter quantity">
        <input type="number" id="item-price" placeholder="Enter price" step="0.01">
        <button id="add-item">Add Item</button>
    </div>

    <div class="search">
        <input type="text" id="search-item" placeholder="Search item">
    </div>

    <div class="disp">
        <table>
            <thead>
                <tr>
                    <th>Item Name</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="item-list">
                <!-- Items will be displayed here -->
            </tbody>
        </table>
    </div>

    <div class="total">
        <h2 id="total">Total:  ₹0.00</h2>
    </div>
    </div>
</body>
</html>
